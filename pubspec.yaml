name: dhukuti
description: "A new Flutter project."

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.2.1
  firebase_auth: ^6.1.2
  cloud_firestore: ^6.1.0
  firebase_messaging: ^16.0.4
  firebase_storage: ^13.0.4
  provider: ^6.1.5+1
  fl_chart: ^0.69.0
  intl: ^0.20.2
  go_router: ^14.6.2
  http: ^1.6.0
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.2
  image_picker: ^1.1.2
  pinput: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.2

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/dhukuti.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/

 
